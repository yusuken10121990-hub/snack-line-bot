<!doctype html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>コレカラ メニュー</title><link rel="stylesheet" href="style.css">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script></head><body>
<header>🌸 スナック コレカラ</header>
<div class="wrap">
  <div class="hello" id="hello">読み込み中…</div>
  <a class="bigbtn" href="shift.html"><span class="i">📅</span>シフト提出</a>
  <a class="bigbtn" href="transit.html"><span class="i">🚃</span>交通費登録</a>
  <a class="bigbtn" href="confirm.html"><span class="i">🗓️</span>シフト確認</a>
  <div class="s" style="margin-top:18px;text-align:center">困ったらBotに「メニュー」と送ってください</div>
</div>
<div id="spin"><div class="sp"></div></div>
<script src="app.js"></script>
<script>
initLiff().then(function(me){
  $('hello').textContent = (me.displayName || '') + ' さん、こんにちは🌸';
  // userIdを各ページへ引き継ぎ(LIFF外テスト用)。LIFF内では各ページが再取得するので無くてもOK。
  if(!(typeof liff!=='undefined' && liff.isInClient()) && me.userId){
    document.querySelectorAll('.bigbtn').forEach(function(a){ a.href += '?uid='+encodeURIComponent(me.userId)+'&name='+encodeURIComponent(me.displayName||''); });
  }
});
</script>
</body></html>
